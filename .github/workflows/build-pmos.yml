name: Build postmarketOS for Xiaomi Mi 8 (equuleus)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-venv \
          git \
          openssh-client \
          rsync \
          curl \
          wget \
          ca-certificates \
          bzip2 \
          xz-utils \
          zstd \
          file \
          unzip \
          cmake \
          make \
          gcc \
          g++ \
          pkg-config \
          libssl-dev \
          libffi-dev \
          libncurses-dev \
          libcap-dev \
          libc6-dev \
          qemu-user-static \
          binfmt-support \
          parted \
          e2fsprogs \
          dosfstools \
          mtools \
          gdisk \
          kmod \
          u-boot-tools \
          fastboot \
          adb \
          android-sdk-platform-tools-common \
          squashfs-tools \
          libarchive-tools \
          bsdmainutils \
          procps \
          iproute2 \
          iptables \
          iputils-ping

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pmbootstrap
      run: |
        python -m pip install --upgrade pip
        pip install tomli
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmbootstrap-repo
        pip install /tmp/pmbootstrap-repo

    - name: Initialize pmbootstrap
      env:
        CI: "true"
      run: |
        pmbootstrap --version

        rm -rf /tmp/pmbootstrap
        mkdir -p /home/runner/.config
        mkdir -p /tmp/pmbootstrap

        git clone https://gitlab.postmarketos.org/postmarketOS/pmaports.git /tmp/pmaports-v25.12
        cd /tmp/pmaports-v25.12
        git checkout v25.12
        git log --oneline -1

        printf "[pmbootstrap]\naports = /tmp/pmaports-v25.12\nboot_size = 512\nbuild_default_device_arch = False\nbuild_pkgs_on_install = True\nccache_size = 5G\ndevice = xiaomi-equuleus\nextra_space = 2048\nhostname = xiaomi-equuleus\nis_default_channel = True\nchannel = v25.12\njobs = 16\nkernel = postmarketos-qcom-sdm845\nkeymap = \nlocale = en_US.UTF-8\nqemu_redir_stdio = False\nssh_key_glob = ~/.ssh/id_*.pub\nssh_keys = False\nsudo_timer = False\nsystemd = default\ntimezone = Asia/Shanghai\nui = none\nui_extras = False\nuser = user\nwork = /tmp/pmbootstrap\n\n[mirrors]\nalpine = http://dl-cdn.alpinelinux.org/alpine/\npmaports = http://mirror.postmarketos.org/postmarketos/\n\n[providers]\n" > /home/runner/.config/pmbootstrap_v3.cfg

        cat /home/runner/.config/pmbootstrap_v3.cfg

        yes "" | pmbootstrap --as-root --details-to-stdout init

        pmbootstrap --as-root update
        pmbootstrap --as-root pull

    - name: Build postmarketOS
      env:
        CI: "true"
      run: |
        pmbootstrap --as-root install --password=147147 || (cat /tmp/pmbootstrap/log.txt && exit 1)

    - name: Export images
      run: |
        pmbootstrap --as-root export
        ls -la /tmp/pmbootstrap/chroot_native/home/pmos/rootfs

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pmos-equuleus-images
        path: |
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/*.img
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/*.zip
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/boot.img
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/initramfs
        retention-days: 7
