name: Build postmarketOS for Xiaomi Mi 8 (equuleus)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-venv \
          git \
          openssh-client \
          rsync \
          curl \
          wget \
          ca-certificates \
          bzip2 \
          xz-utils \
          zstd \
          file \
          unzip \
          cmake \
          make \
          gcc \
          g++ \
          pkg-config \
          libssl-dev \
          libffi-dev \
          libncurses-dev \
          libcap-dev \
          libc6-dev \
          qemu-user-static \
          binfmt-support \
          parted \
          e2fsprogs \
          dosfstools \
          mtools \
          gdisk \
          kmod \
          u-boot-tools \
          fastboot \
          adb \
          android-sdk-platform-tools-common \
          squashfs-tools \
          libarchive-tools \
          bsdmainutils \
          procps \
          iproute2 \
          iptables \
          iputils-ping

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pmbootstrap
      run: |
        python -m pip install --upgrade pip
        pip install tomli
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmbootstrap-repo
        pip install /tmp/pmbootstrap-repo

    - name: Initialize pmbootstrap
      env:
        CI: "true"
      run: |
        pmbootstrap --version

        rm -rf /tmp/pmbootstrap
        mkdir -p /home/runner/.config

        printf "[pmbootstrap]\nwork = /tmp/pmbootstrap\nchannel = v25.12\n" > /home/runner/.config/pmbootstrap_v3.cfg

        pmbootstrap --as-root config device xiaomi-equuleus
        pmbootstrap --as-root config ui none
        pmbootstrap --as-root config user user
        pmbootstrap --as-root config hostname xiaomi-equuleus
        pmbootstrap --as-root config locale en_US.UTF-8
        pmbootstrap --as-root config timezone Asia/Shanghai
        pmbootstrap --as-root config kernel postmarketos-qcom-sdm845
        pmbootstrap --as-root config jobs 16
        pmbootstrap --as-root config ccache_size 5G

        pmbootstrap --as-root config mirrors.alpine http://dl-cdn.alpinelinux.org/alpine/
        pmbootstrap --as-root config mirrors.pmaports http://mirror.postmarketos.org/postmarketos/

        pmbootstrap --as-root update
        pmbootstrap --as-root pull

    - name: Build postmarketOS
      env:
        CI: "true"
      run: |
        pmbootstrap --as-root install --password=147147 || (cat /tmp/pmbootstrap/log.txt && exit 1)

    - name: Export images
      run: |
        pmbootstrap --as-root export
        ls -la /tmp/pmbootstrap/chroot_native/home/pmos/rootfs

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pmos-equuleus-images
        path: |
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/*.img
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/*.zip
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/boot.img
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/initramfs
        retention-days: 7
