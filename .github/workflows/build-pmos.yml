name: Build postmarketOS for Xiaomi Mi 8 (equuleus)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-venv \
          git \
          openssh-client \
          rsync \
          curl \
          wget \
          ca-certificates \
          bzip2 \
          xz-utils \
          zstd \
          file \
          unzip \
          cmake \
          make \
          gcc \
          g++ \
          pkg-config \
          libssl-dev \
          libffi-dev \
          libncurses-dev \
          libcap-dev \
          libc6-dev \
          qemu-user-static \
          binfmt-support \
          parted \
          e2fsprogs \
          dosfstools \
          mtools \
          gdisk \
          kmod \
          u-boot-tools \
          fastboot \
          adb \
          android-sdk-platform-tools-common \
          squashfs-tools \
          libarchive-tools \
          bsdmainutils \
          procps \
          iproute2 \
          iptables \
          iputils-ping

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pmbootstrap
      run: |
        python -m pip install --upgrade pip
        pip install tomli
        git clone https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git /tmp/pmbootstrap-repo
        pip install /tmp/pmbootstrap-repo

    - name: Initialize pmbootstrap
      env:
        CI: "true"
      run: |
        pmbootstrap --version

        mkdir -p /tmp/pmbootstrap

        pmbootstrap --as-root --work=/tmp/pmbootstrap init \
          --non-interactive \
          --device=xiaomi-equuleus \
          --mirror-alpine=https://dl-cdn.alpinelinux.org/alpine \
          --mirror-pmOS=https://mirror.postmarketos.org \
          --ui=none \
          --extra-space=2048

        pmbootstrap --as-root --work=/tmp/pmbootstrap config jobs $(nproc)
        pmbootstrap --as-root --work=/tmp/pmbootstrap config ccache true

        pmbootstrap --as-root --work=/tmp/pmbootstrap pull

    - name: Build postmarketOS
      env:
        CI: "true"
      run: |
        pmbootstrap --as-root --work=/tmp/pmbootstrap install --no-fde

    - name: Export images
      run: |
        pmbootstrap --as-root --work=/tmp/pmbootstrap export
        ls -la /tmp/pmbootstrap/chroot_native/home/pmos/rootfs

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pmos-equuleus-images
        path: |
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/*.img
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/*.zip
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/boot.img
          /tmp/pmbootstrap/chroot_native/home/pmos/rootfs/initramfs
        retention-days: 7